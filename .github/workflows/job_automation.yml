name: Daily Job Discovery Pipeline

on:
  schedule:
    # ── SCHEDULE (edit just this one line to change cadence) ───────────────────
    # 15:00 UTC ≈ 9:00 AM Mountain (8:00 AM in winter / MST) — your existing run time.
    #   Daily:          '0 15 * * *'
    #   Weekdays only:  '0 15 * * 1-5'
    #   Weekly (Mon):   '0 15 * * 1'  (current — descaled for low-season; bump up in fall)
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  discover-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv gspread google-auth

      - name: Run job scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 job_scraper.py

      - name: Append new jobs to Google Sheet
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 sheet_logger.py

      - name: Upload results as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_number }}
          path: results_*.json
          retention-days: 30
